<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ケータリング案件</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 16px;
    }

    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 12px 0 6px;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 10px;
    }

    input,
    select,
    textarea {
      padding: 12px;
      border: 1px solid #ccc;
      background: #fff;
      margin-top: 8px;
    }

    textarea {
      min-height: 420px;
      resize: vertical;
      line-height: 1.5;
    }

    button {
      border: none;
      padding: 14px;
      margin-top: 10px;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
    }

    .btn-main {
      background: #06c755;
    }

    .btn-sub {
      background: #2d7ef7;
    }

    .btn-line {
      background: #00b900;
    }

    .btn-back {
      background: #666;
    }

    .note {
      color: #666;
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .check-list {
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }

    .check-item input[type="checkbox"] {
      width: auto;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <button class="btn-back" type="button" onclick="location.href='index.html'">案件選択へ戻る</button>

      <h1>ケータリング案件</h1>

      <label for="timing">日付区分</label>
      <select id="timing">
        <option value="明日">明日</option>
        <option value="明後日">明後日</option>
        <option value="週明け">週明け</option>
      </select>

      <label for="jobContent">案件内容</label>
      <select id="jobContent">
        <option value="往復便（配達と回収）">往復便（配達と回収）</option>
        <option value="オードブル配達のみ">オードブル配達のみ</option>
        <option value="往復便+オードブル配達のみ">往復便+オードブル配達のみ</option>
        <option value="往復便+オードブル配達のみ(同時積み込み)">往復便+オードブル配達のみ(同時積み込み)</option>
        <option value="回収のみ">回収のみ</option>
      </select>

      <label for="reward">ドライバーへの報酬（数字のみ）</label>
      <input id="reward" type="number" placeholder="例：13000">

      <label for="units">台口（数字のみ・最大10）</label>
      <input id="units" type="number" min="1" max="10" value="2">

      <label for="arrivalTime">着車時間（数字4桁）</label>
      <input id="arrivalTime" type="text" inputmode="numeric" maxlength="5" placeholder="例：1300">

      <h2>ドライバー</h2>
      <div id="driverFields"></div>

      <div id="multiLocationArea">
        <label>南砂倉庫 担当（複数選択可）</label>
        <div id="minamisunaDriverList" class="check-list"></div>

        <label>扇橋オフィス 担当（複数選択可）</label>
        <div id="ougibashiDriverList" class="check-list"></div>
      </div>

      <div id="singleLocationArea" class="hidden">
        <label for="singleLocationType">着車場所（1台口用）</label>
        <select id="singleLocationType">
          <option value="南砂倉庫">南砂倉庫</option>
          <option value="扇橋オフィス">扇橋オフィス</option>
        </select>
      </div>

      <button class="btn-main" type="button" onclick="makeText()">文章作成</button>
    </div>

    <div class="card">
      <h2>生成結果</h2>
      <textarea id="result" placeholder="ここに文章が表示されます"></textarea>
      <button class="btn-sub" type="button" onclick="copyText()">コピー</button>
      <button class="btn-line" type="button" onclick="openLineFromResult()">LINEを開く</button>
      <div class="note">
        LINEが開かない場合は、「コピー」してLINEに貼り付けて使ってください。
      </div>
    </div>
  </div>

  <script>
    function getFormattedDate(timing) {
      const date = new Date();

      if (timing === "明日") {
        date.setDate(date.getDate() + 1);
      } else if (timing === "明後日") {
        date.setDate(date.getDate() + 2);
      } else if (timing === "週明け") {
        const day = date.getDay();
        let diff = (8 - day) % 7;
        if (diff === 0) diff = 7;
        date.setDate(date.getDate() + diff);
      }

      const week = ["日", "月", "火", "水", "木", "金", "土"];
      return `${date.getMonth() + 1}月${date.getDate()}日（${week[date.getDay()]}）`;
    }

    function formatYen(value) {
      if (!value) return "";
      return "¥" + Number(value).toLocaleString();
    }

    function formatUnits(value) {
      if (!value) return "";
      return value + "台口";
    }

    function formatArrivalTime(value) {
      const numbers = value.replace(/\D/g, "").slice(0, 4);

      if (numbers.length <= 2) {
        return numbers;
      }

      return numbers.slice(0, 2) + ":" + numbers.slice(2);
    }

    function addSan(name) {
      if (!name) return "";
      return name.endsWith("さん") ? name : name + "さん";
    }

    function buildDriverFields() {
      const container = document.getElementById("driverFields");
      container.innerHTML = "";

      for (let i = 1; i <= 10; i++) {
        const input = document.createElement("input");
        input.id = "driver" + i;
        input.type = "text";
        input.placeholder = "ドライバー" + i;
        input.className = i <= 2 ? "" : "hidden";
        input.addEventListener("input", updateDriverSelectors);
        container.appendChild(input);
      }
    }

    function updateDriverFields() {
      const units = Math.min(Math.max(parseInt(document.getElementById("units").value, 10) || 1, 1), 10);

      for (let i = 1; i <= 10; i++) {
        const field = document.getElementById("driver" + i);
        if (!field) continue;

        if (i <= units) {
          field.classList.remove("hidden");
        } else {
          field.classList.add("hidden");
          field.value = "";
        }
      }

      if (units === 1) {
        document.getElementById("multiLocationArea").classList.add("hidden");
        document.getElementById("singleLocationArea").classList.remove("hidden");
      } else {
        document.getElementById("multiLocationArea").classList.remove("hidden");
        document.getElementById("singleLocationArea").classList.add("hidden");
      }

      updateDriverSelectors();
    }

    function getDriverNames() {
      const units = Math.min(Math.max(parseInt(document.getElementById("units").value, 10) || 1, 1), 10);
      const names = [];

      for (let i = 1; i <= units; i++) {
        const field = document.getElementById("driver" + i);
        if (!field) continue;

        const value = field.value.trim();
        if (value) {
          names.push(value);
        }
      }

      return names;
    }

    function createCheckboxList(containerId, names, prefix) {
      const container = document.getElementById(containerId);
      const checkedValues = Array.from(container.querySelectorAll("input[type='checkbox']:checked")).map(cb => cb.value);

      container.innerHTML = "";

      if (names.length === 0) {
        container.innerHTML = '<div class="note">ドライバー名を入力すると、ここで選べます。</div>';
        return;
      }

      names.forEach(function(name, index) {
        const item = document.createElement("label");
        item.className = "check-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = name;
        checkbox.id = prefix + "_" + index;

        if (checkedValues.includes(name)) {
          checkbox.checked = true;
        }

        const span = document.createElement("span");
        span.textContent = addSan(name);

        item.appendChild(checkbox);
        item.appendChild(span);
        container.appendChild(item);
      });
    }

    function updateDriverSelectors() {
      const names = getDriverNames();
      createCheckboxList("minamisunaDriverList", names, "minami");
      createCheckboxList("ougibashiDriverList", names, "ougi");
    }

    function getCheckedNames(containerId) {
      const checked = document.querySelectorAll(`#${containerId} input[type='checkbox']:checked`);
      return Array.from(checked).map(cb => addSan(cb.value));
    }

    function getSingleLocationText(locationType) {
      if (locationType === "南砂倉庫") {
        return `【南砂倉庫】
江東区南砂1-1-6`;
      }

      return `【扇橋オフィス】
江東区扇橋2-18-5`;
    }

    function makeText() {
      const timing = document.getElementById("timing").value;
      const formattedDate = getFormattedDate(timing);
      const jobContent = document.getElementById("jobContent").value;
      const rewardRaw = document.getElementById("reward").value.trim();
      const unitsRaw = document.getElementById("units").value.trim();
      const arrivalRaw = document.getElementById("arrivalTime").value.trim();
      const driverNames = getDriverNames();

      const reward = formatYen(rewardRaw);
      const units = formatUnits(unitsRaw);
      const arrivalTime = formatArrivalTime(arrivalRaw) ? formatArrivalTime(arrivalRaw) + "着車" : "";

      let driverBlock = "";
      if (driverNames.length > 0) {
        driverBlock = driverNames.map(addSan).join("\n");
      }

      const unitNumber = Math.min(Math.max(parseInt(unitsRaw, 10) || 1, 1), 10);

      let locationBlock = "";

      if (unitNumber === 1) {
        const singleLocationType = document.getElementById("singleLocationType").value;
        locationBlock =
`${arrivalTime}
${getSingleLocationText(singleLocationType)}

【配達先】
PDF参照`;
      } else {
        const minamisunaNames = getCheckedNames("minamisunaDriverList");
        const ougibashiNames = getCheckedNames("ougibashiDriverList");

        locationBlock =
`${arrivalTime}
【南砂倉庫】
江東区南砂1-1-6
${minamisunaNames.join("\n")}

【扇橋オフィス】
江東区扇橋2-18-5
${ougibashiNames.join("\n")}`;
      }

      const text =
`${timing}
${formattedDate}

ケータリング
${jobContent}
${reward}

${units}
${driverBlock}

${locationBlock}

🚫全員にお願いです🚫
『時間通り』に着車して下さい。

セカンドテーブルさんは
PDFの時間に合わせて
準備と段取りしています。

私が設定した時間に
疑問があれば
事前に遠慮なくご相談下さい。

【立替金の領収書について】
領収書の『裏面』に
ケータリング
と記入していただき
ご自身の名前を書いて
提出してください。

稼働日から1週間以内に
江戸川区春江町2-6-8
1階
ミネルバ宛
郵送または持ち込み
お願い致します`;

      document.getElementById("result").value = text;
    }

    function copyText() {
      const text = document.getElementById("result").value;

      if (!text.trim()) {
        alert("先に文章を作成してください。");
        return;
      }

      navigator.clipboard.writeText(text)
        .then(function() {
          alert("コピーしました。");
        })
        .catch(function() {
          alert("コピーに失敗しました。");
        });
    }

    function openLineFromResult() {
      const text = document.getElementById("result").value;

      if (!text.trim()) {
        alert("先に文章を作成してください。");
        return;
      }

      const encoded = encodeURIComponent(text);
      const url = "https://line.me/R/msg/text/?" + encoded;
      window.location.href = url;
    }

    document.addEventListener("DOMContentLoaded", function() {
      buildDriverFields();
      updateDriverFields();

      document.getElementById("units").addEventListener("input", updateDriverFields);

      document.getElementById("arrivalTime").addEventListener("input", function(e) {
        e.target.value = formatArrivalTime(e.target.value);
      });
    });
  </script>
</body>
</html>
