<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件選択</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    .wrap {
      max-width: 500px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    p {
      color: #666;
      line-height: 1.6;
    }

    select, button {
      width: 100%;
      font-size: 16px;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      border-radius: 10px;
    }

    select {
      border: 1px solid #ccc;
      background: #fff;
    }

    button {
      border: none;
      background: #06c755;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>案件を選択してください</h1>
    <p>使いたい案件のページへ進みます。</p>

    <select id="pageSelect">
      <option value="">選択してください</option>
      <option value="bento.html">弁当チャーター</option>
    </select>

    <button onclick="goPage()">進む</button>
  </div>

  <script>
    function goPage() {
      const page = document.getElementById("pageSelect").value;

      if (!page) {
        alert("案件を選択してください。");
        return;
      }

      window.location.href = page;
    }
  </script>
</body>
</html>
