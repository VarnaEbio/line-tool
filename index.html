<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE定型文作成ツール</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 16px;
    }

    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 12px 0 6px;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 10px;
    }

    input,
    select,
    textarea {
      padding: 12px;
      border: 1px solid #ccc;
      background: #fff;
    }

    textarea {
      min-height: 320px;
      resize: vertical;
      line-height: 1.5;
    }

    button {
      border: none;
      padding: 14px;
      margin-top: 10px;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
    }

    .btn-main {
      background: #06c755;
    }

    .btn-sub {
      background: #2d7ef7;
    }

    .btn-driver {
      background: #555;
    }

    .note {
      color: #666;
      font-size: 13px;
      margin-top: 8px;
    }

    #individualButtons button {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>LINE定型文作成ツール</h1>

      <label for="timing">日付区分</label>
      <select id="timing">
        <option value="明日">明日</option>
        <option value="明後日">明後日</option>
        <option value="週明け">週明け</option>
      </select>

      <label for="template">案件</label>
      <select id="template">
        <option value="AM弁当チャーター">AM弁当チャーター</option>
        <option value="1日弁当チャーター">1日弁当チャーター</option>
      </select>

      <label for="name1">ドライバー名（最大5名）</label>
      <input id="name1" type="text" placeholder="ドライバー1">
      <input id="name2" type="text" placeholder="ドライバー2">
      <input id="name3" type="text" placeholder="ドライバー3">
      <input id="name4" type="text" placeholder="ドライバー4">
      <input id="name5" type="text" placeholder="ドライバー5">

      <button class="btn-main" type="button" onclick="makeText()">文章作成</button>
    </div>

    <div class="card">
      <h2>生成結果</h2>
      <textarea id="result" placeholder="ここに文章が表示されます"></textarea>
      <button class="btn-sub" type="button" onclick="copyText()">コピー</button>


    <div class="card">
      <h2>個別送信用ボタン</h2>
      <div id="individualButtons"></div>
    </div>
  </div>

  <script>
    function getFormattedDate(timing) {
      const date = new Date();

      if (timing === "明日") {
        date.setDate(date.getDate() + 1);
      } else if (timing === "明後日") {
        date.setDate(date.getDate() + 2);
      } else if (timing === "週明け") {
        const day = date.getDay();
        let diff = (8 - day) % 7;
        if (diff === 0) {
          diff = 7;
        }
        date.setDate(date.getDate() + diff);
      }

      const week = ["日", "月", "火", "水", "木", "金", "土"];
      return `${date.getMonth() + 1}月${date.getDate()}日(${week[date.getDay()]})`;
    }

    function buildMessageForNames(names) {
  const timing = document.getElementById("timing").value;
  const template = document.getElementById("template").value;
  const formattedDate = getFormattedDate(timing);

  let nameBlock = "";
  if (names.length > 0) {
    nameBlock = names.map(function(name) {
      return name + "さん";
    }).join("\n");
  }

  const text =
`お疲れ様です。

${nameBlock ? nameBlock + "\n\n" : ""}${timing}
${formattedDate}
${template}

●伝票の注意事項しっかりと確認してください。
●着車時間余裕をもち出発お願いします。
●請求書のテレコ発生しています。
ピックアップ先で確認お願いします。
●商品ピックアップ漏れ発生してます。
伝票右下に確認する欄ありますのでそこで確実にチェックしてください。
チェックせずにピック漏れした場合、自己負担金発生する場合あります。
⬆️
一撃8万円負担金発生事例あります。。

⚠️時間を確実に守るようにしてください。
⚠️ピック遅れ、納品遅れ、少しでも何か現場で起きた場合スタフェスへの050-3388-7522に連絡徹底してください。

宜しくお願い致します。`;

  return text;
}

      names.forEach(function(name) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-driver";
        btn.textContent = name + "さん用を作成";
        btn.onclick = function() {
          const text = buildMessageForNames([name]);
          document.getElementById("result").value = text;
        };
        container.appendChild(btn);
      });
    }

    renderIndividualButtons([]);
  </script>
</body>
</html>
